<div class="settings-page page-padding">
  <form [formGroup]="formCtrl" class="form">
    <app-form-image [parentForm]="formCtrl"></app-form-image>

    <app-form-command
      *ngIf="isContainer"
      [parentForm]="formCtrl"
    ></app-form-command>

    <app-form-replicas
      *ngIf="isContainer"
      [parentForm]="formCtrl"
    ></app-form-replicas>

    <app-form-cpu-ram
      [parentForm]="formCtrl"
      [readonlyCPU]="config?.cpu?.readOnly"
      [readonlyMemory]="config?.memory?.readOnly"
      [cpuLimitFactor]="config?.cpu?.limitFactor"
      [memoryLimitFactor]="config?.memory?.limitFactor"
    ></app-form-cpu-ram>

    <app-form-gpus
      [parentForm]="formCtrl"
      [vendors]="config?.gpus?.value.vendors"
    ></app-form-gpus>

    <app-form-environment-variables
      *ngIf="isContainer"
      [envsArray]="envs"
    ></app-form-environment-variables>

    <app-form-data-volumes
      [volsArray]="datavols"
      [readonly]="config?.dataVolumes?.readOnly"
      [externalName]="name"
    >
    </app-form-data-volumes>
  </form>

  <div class="form-buttons">
    <button
      mat-raised-button
      color="primary"
      type="button"
      [disabled]="!canSave"
      (click)="save()"
      i18n
    >
      SAVE
    </button>
  </div>
</div>
